- alias: "Sync Tasmota states on start-up - autodiscovery"
  initial_state: true
  trigger:
    platform: homeassistant
    event: start
  action:
    - service: mqtt.publish
      data:
        topic: "tasmotas/cmnd/state"
        payload: ""

- alias: "Turn ON Outdoor"
  initial_state: true
  trigger:
    platform: homeassistant
    event: start
  action:
    - service: script.outdoor