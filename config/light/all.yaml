- platform: mqtt
  unique_id: outdoor
  name: "Outdoor Lights"
  state_topic: switch1/stat/RESULT
  value_template: "{{ value_json.POWER1 }}"
  command_topic: switch1/cmnd/POWER1
  payload_on: "ON"
  payload_off: "OFF"
  qos: 1
  retain: false
  availability_topic: switch1/tele/LWT
  payload_available: "Online"
  payload_not_available: "Offline"
  
